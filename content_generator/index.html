<header>

  <p>純靜態版本，不呼叫任何外部 API、不需要金鑰。只要給主關鍵字與客戶評論，就能自動偵測評論重點並引用回應，產生 300 字以內、適合回覆 Google 商家評論、也容易被 AI 引擎摘錄引用的內容。</p>
</header>

<div class="layout">
  <div>
    <div class="card">
      <h2>輸入資料</h2>
      <label>主關鍵字</label>
      <input id="rrMainKeyword" placeholder="例：植牙手術">
      <label>客戶評論內容（貼上想回覆的評論）</label>
      <textarea id="rrFeedback" placeholder="例：醫師人很親切，環境也很乾淨，等待時間比想像中短，效果我很滿意！"></textarea>
      <div class="row-actions">
        <button id="rrGenerateBtn">產生內容</button>
        <button class="secondary" id="rrRerollBtn">換一批</button>
      </div>
      <div id="rrError" class="error"></div>
      <details>
        <summary>進階設定（選填，不填也能生成）</summary>
        <label>品牌名稱</label>
        <input id="rrBrand" placeholder="例：安心牙醫診所（留空則用「我們」代稱）">
        <label>醫師名稱</label>
        <input id="rrDoctorName" placeholder="例：王小明">
        <label>相關關鍵字（逗號分隔）</label>
        <input id="rrRelatedKeywords" placeholder="例：牙周治療, 全瓷冠, 數位掃描">
        <label>文風</label>
        <select id="rrStyle">
          <option value="專業信賴">專業信賴</option>
          <option value="親切溫暖">親切溫暖</option>
          <option value="活潑熱情">活潑熱情</option>
          <option value="簡潔俐落">簡潔俐落</option>
        </select>
        <label>特色優勢（逗號分隔）</label>
        <input id="rrAdvantages" placeholder="例：專業技術, 貼心服務, 舒適環境">
        <label>服務數據（逗號分隔，例如年資、案例數、滿意度）</label>
        <input id="rrServiceData" placeholder="例：10年經驗, 500+案例, 98%滿意度">
      </details>
      <div id="rrWarning" class="warning"></div>
      <div class="hint">內容為模板拼接產生，屬於通用草稿，發布前建議依實際情況微調用詞。貼上評論內容只會做關鍵字比對與引用，不會真正理解語意。</div>
    </div>
  </div>

  <div>
    <div class="card">
      <h2>產出結果（300 字以內）</h2>
      <div id="rrOutput">尚未生成內容。請填寫左側資料後按「產生內容」。</div>
      <div id="rrCharCount" class="char-count"></div>
      <button class="secondary" id="rrCopyBtn">複製內容</button>
    </div>
  </div>
</div>

const MAX_QUOTE_LENGTH = 40;
const MAX_TOTAL_LENGTH = 300;

function hasTopicKeyword(segment) {
  return Object.values(FEEDBACK_TOPIC_KEYWORDS).some(list => list.some(k => segment.includes(k)));
}

// Many real reviews are one long comma-separated run-on with no period
// until the very end ("之前左上後牙痛了好一陣子，看了幾間都說沒看到明顯
// 蛀牙，所以...，醫師人很親切，效果我很滿意！"). Splitting only on 。！？
// treats that whole thing as a single segment, so a blind length cutoff
// grabs the first 40 characters — the background/symptom part — instead
// of the actual compliment. Split on commas too to get individual clauses,
// then pick the clause that actually names something positive.
function splitClauses(feedback) {
  return feedback.split(/[。！？!?，,、\n]/).map(s => s.trim()).filter(Boolean);
}

function extractQuote(feedback) {
  const clauses = splitClauses(feedback);
  if (clauses.length === 0) return feedback.trim();

  const idx = clauses.findIndex(hasTopicKeyword);
  if (idx !== -1) {
    // Pull in the next clause too so the quote doesn't feel like a
    // fragment, as long as it still fits the length budget.
    let quote = clauses[idx];
    if (idx + 1 < clauses.length) {
      const combined = quote + '，' + clauses[idx + 1];
      if (combined.length <= MAX_QUOTE_LENGTH) quote = combined;
    }
    return quote.length > MAX_QUOTE_LENGTH ? quote.slice(0, MAX_QUOTE_LENGTH) + '…' : quote;
  }

  // No clause names a specific compliment keyword. Reviews typically state
  // the overall verdict last, so prefer the final clause(s) over the first
  // (which is usually background/symptom description).
  const tail = clauses.slice(-2).join('，');
  const quote = tail.length <= MAX_QUOTE_LENGTH ? tail : clauses[clauses.length - 1];
  return quote.length > MAX_QUOTE_LENGTH ? quote.slice(0, MAX_QUOTE_LENGTH) + '…' : quote;
}

function detectTopics(feedback) {
  return Object.keys(FEEDBACK_TOPIC_KEYWORDS).filter(topic =>
    FEEDBACK_TOPIC_KEYWORDS[topic].some(k => feedback.includes(k))
  );
}

function isNegativeFeedback(feedback) {
  return NEGATIVE_FEEDBACK_KEYWORDS.some(k => feedback.includes(k));
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function splitList(text) {
  return text.split(/[,，、]/).map(s => s.trim()).filter(Boolean);
}

function joinPhrase(list, fallback, max = 3) {
  const items = list.slice(0, max);
  return items.length > 0 ? items.join('、') : fallback;
}

function fillTemplate(template, vars) {
  return template.replace(/\{(\w+)\}/g, (_, key) => vars[key] || '');
}

function generateReviewReply() {
  el('rrError').textContent = '';
  el('rrWarning').textContent = '';
  const mainKeyword = el('rrMainKeyword').value.trim();
  if (!mainKeyword) {
    el('rrError').textContent = '主關鍵字為必填';
    return;
  }
  // Brand name is optional — falls back to "我們" so a reply can be
  // generated from just a keyword and a patient review.
  const brand = el('rrBrand').value.trim() || '我們';
  const doctorName = el('rrDoctorName').value.trim();
  const relatedKeywords = splitList(el('rrRelatedKeywords').value);
  const advantages = splitList(el('rrAdvantages').value);
  const serviceData = splitList(el('rrServiceData').value);
  const feedback = el('rrFeedback').value.trim();
  const style = el('rrStyle').value;

  const vars = {
    mainKeyword,
    brand,
    doctorName,
    relatedKeywordsPhrase: joinPhrase(relatedKeywords, '相關服務'),
    advantagesPhrase: joinPhrase(advantages, '用心服務'),
  };
  // Middle sentences say "我們" instead of repeating the brand name every
  // time — brand is only spelled out in the opening and closing lines.
  const pronounVars = { ...vars, brand: '我們' };

  const t = REVIEW_TEMPLATES[style];

  // Fixed narrative order (no shuffling): greet -> respond directly to what
  // the customer wrote (if anything was pasted) -> highlight strengths ->
  // mention the doctor -> close. Keeping this order stops sentences from
  // landing in a random, disconnected sequence.
  const middles = [];

  let isNegative = false;
  if (feedback) {
    isNegative = isNegativeFeedback(feedback);
    const quote = extractQuote(feedback);
    if (isNegative) {
      el('rrWarning').textContent = '偵測到這則評論可能包含負面內容，本工具只做關鍵字比對，建議由專人親自回覆，不要直接套用以下內容。';
      middles.push(fillTemplate(pickRandom(NEGATIVE_FEEDBACK_QUOTE_TEMPLATES), { ...pronounVars, quote }));
    } else {
      middles.push(fillTemplate(pickRandom(FEEDBACK_QUOTE_TEMPLATES), { ...pronounVars, quote }));
      const topics = detectTopics(feedback);
      const validationBank = topics.length > 0 ? FEEDBACK_TOPIC_TEMPLATES[topics[0]] : GENERAL_VALIDATION_TEMPLATES;
      middles.push(fillTemplate(pickRandom(validationBank), pronounVars));
    }
  }

  middles.push(fillTemplate(pickRandom(t.middleAdvantage), pronounVars));
  if (serviceData.length > 0) {
    const serviceDataPhrase = joinPhrase(serviceData, '', 3);
    middles.push(fillTemplate(pickRandom(DATA_TEMPLATES), { ...pronounVars, serviceDataPhrase }));
  }
  if (relatedKeywords.length > 0) {
    middles.push(fillTemplate(pickRandom(t.middleRelated), pronounVars));
  }
  if (doctorName) {
    middles.push(fillTemplate(pickRandom(t.middleDoctor), pronounVars));
  }
  if (!feedback && Math.random() < 0.6) {
    middles.push(fillTemplate(pickRandom(t.middleReassurance), pronounVars));
  }
  if (feedback && !isNegative && Math.random() < 0.6) {
    let encourage = fillTemplate(pickRandom(ENCOURAGE_OTHERS_TEMPLATES), pronounVars);
    const emoji1 = maybeEmoji(style);
    if (emoji1) encourage += emoji1;
    middles.push(encourage);
  }

  let closingText = fillTemplate(pickRandom(t.closing), vars);
  const emoji2 = maybeEmoji(style);
  if (emoji2) closingText += emoji2;

  const openingText = fillTemplate(pickRandom(t.opening), vars);

  // middles is built in priority order (respond to the patient's review
  // first, filler/encouragement sentences last) — if the total runs past
  // the 300-character target, drop from the end so the reply still fits
  // without losing the direct response to what the patient wrote.
  while (middles.length > 0 &&
         (openingText + middles.join('') + closingText).length > MAX_TOTAL_LENGTH) {
    middles.pop();
  }

  const text = [openingText, ...middles, closingText].join('');

  el('rrOutput').textContent = text;
  el('rrCharCount').textContent = `目前約 ${text.length} 字（300 字以內，模板隨機拼接，字數僅供參考）`;
}

el('rrGenerateBtn').onclick = generateReviewReply;
el('rrRerollBtn').onclick = generateReviewReply;

el('rrCopyBtn').onclick = () => {
  const text = el('rrOutput').textContent;
  navigator.clipboard.writeText(text).then(() => alert('已複製到剪貼簿'));
};
</script>
</body>
