<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自費療程月報統計</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --primary: #4f7fe0;
  --primary-dark: #3563c4;
  --bg: #f4f6fb;
  --card: #ffffff;
  --border: #e0e6f0;
  --text: #2c3e50;
  --muted: #7f8c9a;
  --green: #27ae60;
  --red: #e74c3c;
  --yellow: #f39c12;
  --purple: #8e44ad;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
header { background: linear-gradient(135deg, #4f7fe0, #6c3fc5); color: #fff; padding: 18px 32px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
header span { font-size: 1.5rem; }
header h1 { font-size: 1.2rem; font-weight: 700; }
header p { font-size: .8rem; opacity: .8; margin-top: 2px; }

.container { max-width: 1100px; margin: 28px auto; padding: 0 16px; }
.card { background: var(--card); border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); padding: 24px 28px; margin-bottom: 20px; }
h2 { font-size: 1rem; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }

/* Upload */
.upload-area { border: 2px dashed #b0c4e8; border-radius: 10px; padding: 44px 20px; text-align: center; cursor: pointer; transition: all .2s; background: #f8fbff; }
.upload-area:hover, .upload-area.drag { background: #eef4ff; border-color: var(--primary); }
.upload-area .icon { font-size: 3rem; }
.upload-area strong { display: block; margin: 8px 0 4px; font-size: 1rem; }
.upload-area p { font-size: .85rem; color: var(--muted); }
input[type=file] { display: none; }

/* Config */
.config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: .82rem; color: var(--muted); font-weight: 600; }
select, input[type=text], input[type=number] { padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: .88rem; width: 100%; background: #fafbfd; }
select:focus, input:focus { outline: none; border-color: var(--primary); }

.sheet-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.chip { padding: 5px 14px; border-radius: 20px; background: #eef2ff; color: var(--primary); font-size: .83rem; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; user-select: none; }
.chip.on { background: var(--primary); color: #fff; border-color: var(--primary); }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer; font-size: .92rem; font-weight: 700; transition: all .2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-ghost { background: #eef2f7; color: var(--text); }
.btn-ghost:hover { background: #dde4ef; }
.actions { display: flex; gap: 10px; margin-top: 18px; }
.error { color: var(--red); background: #fdf3f2; border: 1px solid #f5c6c1; padding: 9px 14px; border-radius: 7px; margin-top: 10px; font-size: .88rem; }
.hidden { display: none !important; }

/* KPI Summary */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.kpi { background: #fff; border-radius: 10px; padding: 18px 20px; border: 1px solid var(--border); }
.kpi .label { font-size: .78rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
.kpi .val { font-size: 1.8rem; font-weight: 800; }
.kpi.blue .val { color: var(--primary); }
.kpi.green .val { color: var(--green); }
.kpi.purple .val { color: var(--purple); }
.kpi.yellow .val { color: var(--yellow); }
.kpi .sub { font-size: .78rem; color: var(--muted); margin-top: 3px; }

/* Month cards */
.month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.mcard { background: #fff; border-radius: 10px; border: 1px solid var(--border); padding: 18px; }
.mcard h3 { font-size: .95rem; color: var(--primary); margin-bottom: 12px; font-weight: 700; }
.mcard .rows { font-size: .85rem; }
.mcard .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f2f4f8; }
.mcard .row:last-child { border-bottom: none; }
.mcard .row .v { font-weight: 700; }
.mcard .row .v.green { color: var(--green); }

/* Table */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .87rem; }
th { background: #eef2ff; color: var(--primary); padding: 9px 12px; text-align: left; font-weight: 700; white-space: nowrap; }
td { padding: 8px 12px; border-bottom: 1px solid #f0f3fa; white-space: nowrap; }
tr:hover td { background: #fafbff; }
.bar-cell { display: flex; align-items: center; gap: 8px; }
.bar { height: 8px; border-radius: 4px; background: var(--primary); opacity: .7; min-width: 2px; }

/* Tabs */
.tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 18px; }
.tab { padding: 8px 16px; font-size: .88rem; cursor: pointer; border-radius: 6px 6px 0 0; color: var(--muted); font-weight: 600; border: 1px solid transparent; margin-bottom: -2px; }
.tab.active { color: var(--primary); border-color: var(--border); border-bottom-color: #fff; background: #fff; }

/* Chart legend */
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: .8rem; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

.section-title { font-size: .95rem; font-weight: 700; color: var(--text); margin-bottom: 12px; }
</style>
</head>
<body>
<header>
  <span>📊</span>
  <div>
    <h1>自費療程月報統計系統</h1>
    <p>上傳 Excel 自動產生各月份統計報表</p>
  </div>
</header>

<div class="container">

<!-- Step 1: Upload -->
<div class="card" id="s1">
  <h2>① 上傳 Excel 檔案</h2>
  <div class="upload-area" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="icon">📂</div>
    <strong>點擊選擇或拖曳檔案到這裡</strong>
    <p>支援 .xlsx / .xls　每個分頁 = 一個月份</p>
  </div>
  <div id="err1" class="error hidden"></div>
</div>

<!-- Step 2: Config -->
<div class="card hidden" id="s2">
  <h2>② 設定欄位對應</h2>

  <div class="section-title" style="margin-bottom:8px;">選擇要統計的月份（可多選）</div>
  <div class="sheet-chips" id="sheetChips"></div>

  <div class="section-title" style="margin-bottom:8px;">表頭在第幾列？</div>
  <div style="margin-bottom:16px;display:flex;align-items:center;gap:10px;">
    <select id="headerRow" style="width:120px;"></select>
    <span style="font-size:.82rem;color:var(--muted);">（預覽：表頭欄位如上方下拉選單所示）</span>
  </div>

  <div class="section-title" style="margin-bottom:10px;">對應欄位</div>
  <div class="config-grid">
    <div class="field"><label>客戶識別欄（選填）</label><select id="cName"><option value="">不使用</option></select></div>
    <div class="field"><label>新/舊客判斷欄（選填）</label><select id="cIsNew"><option value="">不使用</option></select></div>
    <div class="field"><label>新客標記值（逗號分隔）</label><input type="text" id="newVals" value="新,Y,y,yes,是,1,true"></div>
    <div class="field"><label>來源管道欄（選填）</label><select id="cSource"><option value="">不使用</option></select></div>
    <div class="field"><label>療程項目欄（選填）</label><select id="cTreat"><option value="">不使用</option></select></div>
    <div class="field"><label>費用欄（選填）</label><select id="cFee"><option value="">不使用</option></select></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="analyzeBtn">🔍 開始統計</button>
    <button class="btn btn-ghost" id="reuploadBtn">↩ 重新上傳</button>
  </div>
  <div id="err2" class="error hidden"></div>
</div>

<!-- Step 3: Results -->
<div id="s3" class="hidden">

  <!-- KPI -->
  <div class="card">
    <h2>📈 整體概覽</h2>
    <div class="kpi-row" id="kpiRow"></div>
  </div>

  <!-- Tabs -->
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-tab="monthly">各月明細</div>
      <div class="tab" data-tab="source">來源管道</div>
      <div class="tab" data-tab="treatment">療程統計</div>
      <div class="tab" data-tab="revenue">營收趨勢</div>
    </div>

    <!-- Monthly -->
    <div id="tab-monthly">
      <div class="month-grid" id="monthGrid"></div>
    </div>

    <!-- Source -->
    <div id="tab-source" class="hidden">
      <div class="tbl-wrap" id="sourceTable"></div>
    </div>

    <!-- Treatment -->
    <div id="tab-treatment" class="hidden">
      <div class="tbl-wrap" id="treatTable"></div>
    </div>

    <!-- Revenue -->
    <div id="tab-revenue" class="hidden">
      <div id="revTable"></div>
    </div>

  </div>

  <div style="margin-bottom:20px;">
    <button class="btn btn-ghost" id="backBtn">← 返回修改設定</button>
  </div>
</div>

</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let workbook = null;
let allColumns = [];
let previewRows = [];

// ─── Upload ───────────────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) readFile(fileInput.files[0]); });

function readFile(file) {
  if (!file.name.match(/\.(xlsx|xls)$/i)) { showErr('err1', '請上傳 .xlsx 或 .xls 格式的 Excel 檔案'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      workbook = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      buildStep2();
    } catch(err) { showErr('err1', '讀取 Excel 失敗：' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ─── Step 2 ───────────────────────────────────────────────────────────────────
function buildStep2() {
  // Sheet chips
  const chips = document.getElementById('sheetChips');
  chips.innerHTML = '';
  workbook.SheetNames.forEach(name => {
    const c = document.createElement('div');
    c.className = 'chip on';
    c.textContent = name;
    c.dataset.sheet = name;
    c.addEventListener('click', () => c.classList.toggle('on'));
    chips.appendChild(c);
  });

  // Header row selector (preview first sheet)
  const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });
  previewRows = raw;
  const hrSel = document.getElementById('headerRow');
  hrSel.innerHTML = '';
  for (let i = 0; i < Math.min(10, raw.length); i++) {
    const preview = raw[i].slice(0, 5).filter(Boolean).join(' / ');
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `第 ${i + 1} 列 — ${preview || '(空)'}`;
    hrSel.appendChild(opt);
  }
  hrSel.addEventListener('change', updateColumns);
  updateColumns();

  show('s2'); hide('s1'); hide('s3');
}

function updateColumns() {
  const hr = parseInt(document.getElementById('headerRow').value) || 0;
  allColumns = (previewRows[hr] || []).map(c => String(c).trim()).filter(Boolean);
  const ids = ['cName', 'cIsNew', 'cSource', 'cTreat', 'cFee'];
  ids.forEach(id => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = '<option value="">不使用</option>';
    allColumns.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      if (c === cur) opt.selected = true;
      sel.appendChild(opt);
    });
  });
  // Auto-guess columns
  autoGuess();
}

function autoGuess() {
  const guesses = {
    cName:   ['姓名','客戶','客人','名稱','name','client'],
    cIsNew:  ['新舊客','新/舊','類型','是否新客','new','新客','屬性'],
    cSource: ['來源','管道','介紹','channel','source','行銷'],
    cTreat:  ['療程','項目','服務','treatment','項目名稱','施作'],
    cFee:    ['費用','金額','收費','價格','price','fee','實收','金額小計'],
  };
  Object.entries(guesses).forEach(([id, kws]) => {
    const sel = document.getElementById(id);
    if (sel.value) return;
    const match = allColumns.find(c => kws.some(k => c.toLowerCase().includes(k.toLowerCase())));
    if (match) sel.value = match;
  });
}

// ─── Analyze ─────────────────────────────────────────────────────────────────
document.getElementById('analyzeBtn').addEventListener('click', analyze);
document.getElementById('reuploadBtn').addEventListener('click', () => { show('s1'); hide('s2'); hide('s3'); });
document.getElementById('backBtn').addEventListener('click', () => { show('s2'); hide('s3'); });

function analyze() {
  showErr('err2', '');
  const selectedSheets = [...document.querySelectorAll('#sheetChips .chip.on')].map(c => c.dataset.sheet);
  if (!selectedSheets.length) { showErr('err2', '請至少選擇一個月份分頁'); return; }

  const hr = parseInt(document.getElementById('headerRow').value) || 0;
  const colName   = document.getElementById('cName').value;
  const colIsNew  = document.getElementById('cIsNew').value;
  const colSource = document.getElementById('cSource').value;
  const colTreat  = document.getElementById('cTreat').value;
  const colFee    = document.getElementById('cFee').value;
  const newVals   = document.getElementById('newVals').value.split(',').map(v => v.trim().toLowerCase()).filter(Boolean);

  const results = [];
  const globalSources = {};
  const globalTreatments = {};
  let grandTotal = 0, grandNew = 0, grandFee = 0, grandRows = 0;

  selectedSheets.forEach(sheetName => {
    const sheet = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: hr === 0 ? undefined : 1, defval: '', range: hr });
    // If hr > 0, re-parse with correct header
    let data;
    if (hr === 0) {
      data = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    } else {
      const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      const headers = raw[hr] || [];
      data = raw.slice(hr + 1).map(r => {
        const obj = {};
        headers.forEach((h, i) => { obj[String(h).trim()] = r[i] ?? ''; });
        return obj;
      });
    }

    data = data.filter(r => Object.values(r).some(v => v !== '' && v !== null && v !== undefined));

    let newCount = 0, fee = 0;
    const sources = {}, treatments = {};

    data.forEach(row => {
      if (colIsNew) {
        const v = String(row[colIsNew] ?? '').trim().toLowerCase();
        if (newVals.includes(v)) newCount++;
      }
      if (colFee) {
        const v = parseFloat(String(row[colFee]).replace(/,/g, ''));
        if (!isNaN(v)) fee += v;
      }
      if (colSource) {
        const v = String(row[colSource] ?? '').trim();
        if (v) { sources[v] = (sources[v] || 0) + 1; globalSources[v] = (globalSources[v] || 0) + 1; }
      }
      if (colTreat) {
        const v = String(row[colTreat] ?? '').trim();
        if (v) { treatments[v] = (treatments[v] || 0) + 1; globalTreatments[v] = (globalTreatments[v] || 0) + 1; }
      }
    });

    grandTotal += data.length;
    grandNew += newCount;
    grandFee += fee;
    grandRows += data.length;

    results.push({ month: sheetName, total: data.length, newCount, fee, sources, treatments });
  });

  renderResults(results, { grandTotal, grandNew, grandFee, globalSources, globalTreatments, hasNew: !!colIsNew, hasFee: !!colFee, hasSource: !!colSource, hasTreat: !!colTreat });
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderResults(results, g) {
  // KPI
  const kpi = document.getElementById('kpiRow');
  kpi.innerHTML = '';
  const kpis = [
    { label: '總客次', val: g.grandTotal.toLocaleString(), sub: `共 ${results.length} 個月`, cls: 'blue' },
  ];
  if (g.hasNew) kpis.push({ label: '新客人數', val: g.grandNew.toLocaleString(), sub: `佔比 ${pct(g.grandNew, g.grandTotal)}`, cls: 'green' });
  if (g.hasFee) kpis.push({ label: '總營收', val: 'NT$ ' + g.grandFee.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0}), sub: `平均每月 NT$ ${(g.grandFee/results.length).toLocaleString(undefined,{maximumFractionDigits:0})}`, cls: 'yellow' });
  if (g.hasSource) kpis.push({ label: '來源管道數', val: Object.keys(g.globalSources).length, sub: '不同管道', cls: 'purple' });
  if (g.hasTreat) kpis.push({ label: '療程種類', val: Object.keys(g.globalTreatments).length, sub: '不同療程', cls: 'blue' });

  kpis.forEach(k => {
    const d = document.createElement('div');
    d.className = `kpi ${k.cls}`;
    d.innerHTML = `<div class="label">${k.label}</div><div class="val">${k.val}</div><div class="sub">${k.sub}</div>`;
    kpi.appendChild(d);
  });

  // Monthly cards
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  results.forEach(r => {
    const c = document.createElement('div');
    c.className = 'mcard';
    let html = `<h3>📅 ${r.month}</h3><div class="rows">`;
    html += row('總客次', r.total + ' 人');
    if (g.hasNew) html += row('新客人數', r.newCount + ' 人 (' + pct(r.newCount, r.total) + ')', 'green');
    if (g.hasFee) html += row('本月營收', 'NT$ ' + r.fee.toLocaleString(undefined,{maximumFractionDigits:0}), 'green');
    if (g.hasFee && r.total > 0) html += row('客均消費', 'NT$ ' + (r.fee/r.total).toLocaleString(undefined,{maximumFractionDigits:0}));
    if (g.hasSource && Object.keys(r.sources).length) {
      const top = Object.entries(r.sources).sort((a,b)=>b[1]-a[1])[0];
      html += row('最大來源', `${top[0]} (${top[1]}人)`);
    }
    if (g.hasTreat && Object.keys(r.treatments).length) {
      const top = Object.entries(r.treatments).sort((a,b)=>b[1]-a[1])[0];
      html += row('最多療程', `${top[0]} (${top[1]}次)`);
    }
    html += '</div>';
    c.innerHTML = html;
    grid.appendChild(c);
  });

  // Source table
  if (g.hasSource) {
    const sorted = Object.entries(g.globalSources).sort((a,b)=>b[1]-a[1]);
    const maxV = sorted[0]?.[1] || 1;
    let html = '<table><tr><th>來源管道</th><th>總人次</th><th>佔比</th><th>趨勢</th></tr>';
    sorted.forEach(([src, cnt]) => {
      const p = pct(cnt, g.grandTotal);
      const bw = Math.round((cnt/maxV)*160);
      html += `<tr><td>${src}</td><td><b>${cnt}</b></td><td>${p}</td><td><div class="bar-cell"><div class="bar" style="width:${bw}px"></div></div></td></tr>`;
    });
    html += '</table>';
    document.getElementById('sourceTable').innerHTML = html;
    document.querySelector('[data-tab="source"]').classList.remove('hidden-tab');
  } else {
    document.querySelector('[data-tab="source"]').style.opacity = '.4';
  }

  // Treatment table
  if (g.hasTreat) {
    const sorted = Object.entries(g.globalTreatments).sort((a,b)=>b[1]-a[1]);
    const maxV = sorted[0]?.[1] || 1;
    let html = '<table><tr><th>療程項目</th><th>施作次數</th><th>佔比</th><th>趨勢</th></tr>';
    sorted.forEach(([t, cnt]) => {
      const p = pct(cnt, Object.values(g.globalTreatments).reduce((a,b)=>a+b,0));
      const bw = Math.round((cnt/maxV)*160);
      html += `<tr><td>${t}</td><td><b>${cnt}</b></td><td>${p}</td><td><div class="bar-cell"><div class="bar" style="width:${bw}px;background:#8e44ad;"></div></div></td></tr>`;
    });
    html += '</table>';
    document.getElementById('treatTable').innerHTML = html;
  } else {
    document.querySelector('[data-tab="treatment"]').style.opacity = '.4';
  }

  // Revenue trend table
  if (g.hasFee) {
    let html = '<table><tr><th>月份</th><th>客次</th><th>新客</th><th>營收</th><th>客均消費</th><th>趨勢</th></tr>';
    const maxFee = Math.max(...results.map(r=>r.fee)) || 1;
    results.forEach(r => {
      const bw = Math.round((r.fee/maxFee)*160);
      const avg = r.total ? (r.fee/r.total).toLocaleString(undefined,{maximumFractionDigits:0}) : '-';
      html += `<tr>
        <td><b>${r.month}</b></td>
        <td>${r.total}</td>
        <td>${g.hasNew ? r.newCount : '-'}</td>
        <td><b>NT$ ${r.fee.toLocaleString(undefined,{maximumFractionDigits:0})}</b></td>
        <td>NT$ ${avg}</td>
        <td><div class="bar-cell"><div class="bar" style="width:${bw}px;background:#f39c12;"></div></div></td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('revTable').innerHTML = html;
  } else {
    document.querySelector('[data-tab="revenue"]').style.opacity = '.4';
  }

  show('s3'); hide('s1'); hide('s2');
  switchTab('monthly');
}

function row(label, val, cls='') {
  return `<div class="row"><span>${label}</span><span class="v ${cls}">${val}</span></div>`;
}
function pct(a, b) { return b ? Math.round(a/b*100) + '%' : '0%'; }

// ─── Tabs ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  ['monthly','source','treatment','revenue'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('hidden', id !== name);
  });
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.toggle('hidden', !msg);
}
</script>
